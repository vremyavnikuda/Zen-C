name: Benchmarks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev

    - name: Build Compiler
      run: make ZC_HAS_JIT=1

    - name: Run Benchmarks
      run: ./tests/scripts/run_benchmarks.sh

    - name: Ensure benchmark branch exists
      if: github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin gh-pages:gh-pages || git checkout -b gh-pages
        git checkout main

    - name: Store Benchmark Results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Zen Compiler Benchmarks
        tool: 'customSmallerIsBetter'
        output-file-path: benchmarks_result.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # Only push on main branch
        auto-push: ${{ github.ref == 'refs/heads/main' }}
        # Show alert if performance regresses by 20%
        alert-threshold: '120%'
        comment-on-alert: true
        fail-on-alert: true
