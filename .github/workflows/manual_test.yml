name: Manual Test Dispatch

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Operating System'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - macos-latest
          - macos-13
          - windows-latest
      compiler:
        description: 'Compiler'
        required: true
        default: 'gcc'
        type: choice
        options:
          - gcc
          - clang
      test_file:
        description: 'Specific test file to run (or "all")'
        required: true
        default: 'all'
        type: string
      extra_flags:
        description: 'Extra compiler flags'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  manual-test:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Compiler Environment
        shell: bash
        run: |
          echo "Setting up environment for ${{ inputs.os }} using ${{ inputs.compiler }}"
          if [[ "${{ inputs.os }}" == "macos"* ]]; then
             if [[ "${{ inputs.compiler }}" == "gcc" ]]; then
                echo "Providing GCC on macOS"
                # macOS runners usually have gcc alias to clang, but we might want real gcc-12 etc if available
                # For now we will rely on system default or brew if strictly needed.
                # brew install gcc
             fi
          fi

      - name: Build Compiler
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
             export ZC_HAS_JIT=0
             ./build.bat
          elif [ "${{ runner.os }}" = "macOS" ]; then
             make ZC_HAS_JIT=0
          else
             # On Linux we try to install libtcc-dev first if we want JIT, 
             # but to be safe and fast for manual tests we can also disable it 
             # unless the user passed it in extra_flags.
             # For now let's just use ZC_HAS_JIT=0 for breadth-first stability.
             make ZC_HAS_JIT=0
          fi

      - name: Run Tests
        shell: bash
        run: |
          TEST_TARGET="${{ inputs.test_file }}"
          COMPILER="${{ inputs.compiler }}"
          FLAGS="${{ inputs.extra_flags }}"

          echo "Running tests..."
          echo "Target: $TEST_TARGET"
          echo "Compiler: $COMPILER"
          
          # Detect executable and flags
          ZC_BIN="./zc"
          TRE_FLAGS="-Istd/third-party/tre/include -Istd obj/std/third-party/tre/lib/*.o"
          
          if [ -f "./zc.exe" ]; then
             ZC_BIN="./zc.exe"
             TRE_FLAGS="-Istd/third-party/tre/include -Istd std/third-party/tre/lib/*.c"
          fi
          
          if [ "$TEST_TARGET" = "all" ]; then
              ./tests/scripts/run_tests.sh --cc $COMPILER
          else
             if [ ! -f "$TEST_TARGET" ]; then
                echo "Error: Test file '$TEST_TARGET' not found."
                echo "Available tests:"
                find tests -name "*.zc"
                exit 1
             fi
             $ZC_BIN run "$TEST_TARGET" --cc $COMPILER $FLAGS
          fi
